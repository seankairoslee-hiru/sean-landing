<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <!-- 배경 원 -->
                  <circle cx="100" cy="100" r="95" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>

                  <!-- 책 아이콘 (배움) -->
                  <g id="book">
                      <path d="M 70 60 Q 60 60 60 70 L 60 130 Q 60 140 70 140 L 100 140 L 100 60 Z"
                            fill="#3b82f6" opacity="0.8"/>
                      <path d="M 130 60 Q 140 60 140 70 L 140 130 Q 140 140 130 140 L 100 140 L 100 60 Z"
                            fill="#10b981" opacity="0.8"/>
                      <!-- 페이지 라인 -->
                      <line x1="75" y1="80" x2="95" y2="80" stroke="white" stroke-width="2" stroke-linecap="round"/>
                      <line x1="75" y1="95" x2="95" y2="95" stroke="white" stroke-width="2" stroke-linecap="round"/>
                      <line x1="75" y1="110" x2="95" y2="110" stroke="white" stroke-width="2" stroke-linecap="round"/>

                      <line x1="105" y1="80" x2="125" y2="80" stroke="white" stroke-width="2" stroke-linecap="round"/>
                      <line x1="105" y1="95" x2="125" y2="95" stroke="white" stroke-width="2" stroke-linecap="round"/>
                      <line x1="105" y1="110" x2="125" y2="110" stroke="white" stroke-width="2" stroke-linecap="round"/>
                  </g>

                  <!-- 소통 아이콘 (말풍선) -->
                  <g id="chat" transform="translate(110, 140)">
                      <circle cx="0" cy="0" r="12" fill="#fbbf24" opacity="0.9"/>
                      <polygon points="0,-12 8,0 0,8 -8,0" fill="#fbbf24" opacity="0.9"/>
                  </g>

                  <!-- 과학 궤도 -->
                  <circle cx="100" cy="100" r="50" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
              </svg>